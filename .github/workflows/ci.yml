name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements/ci.txt

      - name: Install dependencies
        run: pip install -r requirements/ci.txt

      - name: Lint (ruff)
        run: ruff check src/ scripts/ tests/

      - name: Format check (black)
        run: black --check src/ scripts/ tests/

      - name: Unit tests
        # Excludes: integration (full-training, real artifact loads, AppTest render),
        #           slow / heavy (model training, RL runs), docking (Vina/GNINA binary).
        # Torch-dependent tests (test_generator_*.py, test_rl_reward.py TestNLLBatch)
        # auto-skip via pytest.importorskip("torch") inside each file.
        # TestDataLoaders artifact-dependent tests auto-skip via conftest.py when
        # models/qsar/general/metadata.json is absent (gitignored in CI).
        run: pytest -m "not integration and not slow and not docking and not heavy" -q --tb=short
